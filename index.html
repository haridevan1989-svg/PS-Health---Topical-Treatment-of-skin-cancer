<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topical Treatment Builder — Dr H. Balachandran</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --lime:#AFFE02;
  --charcoal:#2E2B28;
  --charcoal-mid:#3D3935;
  --charcoal-light:#5A5450;
  --charcoal-faint:#8A8480;
  --bg:#1A1816;
  --bg2:#222019;
  --surface:#2A2724;
  --surface2:#332F2B;
  --border:#3D3935;
  --border-light:#4A4540;
  --text:#F0EDE8;
  --text-muted:#9C9489;
  --text-dim:#6A6560;
  --efudix:#FF5C3A;
  --efudix-soft:rgba(255,92,58,.12);
  --aldara:#3AD68A;
  --aldara-soft:rgba(58,214,138,.12);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── Header ── */
.app-header{
  background:var(--lime);
  color:var(--charcoal);
  padding:0 28px;
  display:flex;align-items:center;justify-content:space-between;
  height:64px;position:sticky;top:0;z-index:100;
}
.hdr-left{display:flex;align-items:center;gap:20px;}
.hdr-logo-block{display:flex;flex-direction:column;gap:0;}
.hdr-logo-svg{display:block;}
.hdr-tool-name{font-size:9.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--charcoal);opacity:.45;margin-top:2px;}
.hdr-div{width:1px;height:36px;background:rgba(46,43,40,.2);}
.hdr-right{font-size:11.5px;color:var(--charcoal);text-align:right;line-height:1.75;opacity:.65;}
.hdr-right strong{font-size:13px;font-weight:700;display:block;opacity:1;letter-spacing:-.01em;}

.app{max-width:1160px;margin:0 auto;padding:32px 24px 100px;}

/* ── Steps ── */
.step-row{margin-bottom:28px;}
.step-lbl{
  font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--lime);font-weight:600;
  margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.step-lbl::before{content:'';display:inline-block;width:3px;height:12px;background:var(--lime);border-radius:1px;}

/* ── Patient inputs ── */
.patient-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);font-weight:500;}
.fg input{
  border:1.5px solid var(--border-light);border-radius:3px;
  padding:9px 14px;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:400;
  background:var(--surface);color:var(--text);outline:none;
  transition:border-color .15s,background .15s;
}
.fg input:focus{border-color:var(--lime);background:var(--surface2);}
.fg input::placeholder{color:var(--text-dim);}
.fg.w220 input{width:220px;} .fg.w160 input{width:160px;} .fg.w140 input{width:140px;}

/* ── Drug selector ── */
.drug-row{display:flex;gap:10px;}
.drug-btn{
  flex:1;padding:16px 20px;border-radius:3px;
  border:2px solid var(--border-light);background:var(--surface);
  cursor:pointer;text-align:left;transition:all .15s;
}
.drug-btn:hover{border-color:var(--border-light);background:var(--surface2);}
.drug-btn.sel-efudix{border-color:var(--efudix);background:var(--efudix-soft);}
.drug-btn.sel-aldara{border-color:var(--aldara);background:var(--aldara-soft);}
.drug-name{font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--text);}
.drug-btn.sel-efudix .drug-name{color:var(--efudix);}
.drug-btn.sel-aldara .drug-name{color:var(--aldara);}
.drug-gen{font-size:12px;color:var(--text-muted);margin-top:3px;font-weight:400;}

/* ── Builder layout ── */
.builder{display:grid;grid-template-columns:230px 1fr;gap:24px;align-items:start;}

/* ── Diagram card ── */
.diagram-card{
  background:var(--surface);border-radius:3px;
  border:1px solid var(--border);padding:14px;
  position:sticky;top:84px;
}
.diagram-hint{font-size:10px;color:var(--text-dim);text-align:center;margin-bottom:8px;letter-spacing:.06em;text-transform:uppercase;}
.phase-legend{margin-top:10px;display:flex;flex-direction:column;gap:3px;}
.legend-item{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:2px;}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.legend-name{font-size:11px;font-weight:600;}
.legend-date{font-size:10px;color:var(--text-dim);margin-left:auto;}

/* ── Zones col ── */
.zones-col{display:flex;flex-direction:column;gap:0;}

.free-zone-row{display:flex;gap:8px;margin-bottom:14px;align-items:center;}
.free-zone-input{
  flex:1;border:1.5px solid var(--border-light);border-radius:3px;
  padding:9px 12px;font-family:'Space Grotesk',sans-serif;font-size:13px;
  background:var(--surface);color:var(--text);outline:none;
  transition:border-color .15s;
}
.free-zone-input::placeholder{color:var(--text-dim);}
.free-zone-input:focus{border-color:var(--lime);}
.free-zone-add{
  padding:9px 16px;border-radius:3px;border:none;
  background:var(--lime);color:var(--charcoal);
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;white-space:nowrap;letter-spacing:.02em;
  transition:opacity .15s;
}
.free-zone-add:hover{opacity:.85;} .free-zone-add:disabled{opacity:.25;cursor:not-allowed;}

.empty-state{
  background:var(--surface);border:1.5px dashed var(--border-light);
  border-radius:3px;padding:48px 24px;
  text-align:center;color:var(--text-dim);font-size:14px;margin-bottom:12px;
}
.empty-icon{font-size:28px;margin-bottom:8px;}

/* ── Timeline ── */
.timeline-preview{
  background:var(--surface);border:1px solid var(--border);
  border-radius:3px;padding:16px 18px;margin-bottom:16px;
}
.tl-title{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;font-weight:600;}
.tl-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.tl-row:last-child{margin-bottom:0;}
.tl-pill{padding:3px 10px;border-radius:2px;font-size:11px;font-weight:700;white-space:nowrap;min-width:66px;text-align:center;}
.tl-bar-wrap{flex:1;height:26px;background:var(--bg2);border-radius:2px;overflow:hidden;}
.tl-bar{height:100%;border-radius:2px;display:flex;align-items:center;padding:0 9px;}
.tl-bar-label{font-size:10.5px;font-weight:600;color:var(--charcoal);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tl-dates{font-size:10.5px;color:var(--text-dim);white-space:nowrap;}

/* ── Phase sections ── */
.phase-section{margin-bottom:12px;}
.phase-header{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;border-radius:3px 3px 0 0;
  background:var(--surface2);border:1.5px solid var(--border-light);border-bottom:none;
}
.phase-pill{padding:3px 10px;border-radius:2px;font-size:11px;font-weight:700;letter-spacing:.06em;}
.phase-dates{font-size:12px;color:var(--text-muted);margin-left:auto;}

.zone-card{
  background:var(--surface);border:1.5px solid var(--border-light);
  border-top:none;overflow:hidden;
}
.zone-card:last-child{border-radius:0 0 3px 3px;}
.zone-hd{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;background:var(--bg2);
  cursor:grab;user-select:none;
}
.zone-hd:active{cursor:grabbing;}
.drag-handle{color:var(--text-dim);font-size:14px;flex-shrink:0;}
.zone-phase-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.zone-lbl{font-size:13.5px;font-weight:600;flex:1;color:var(--text);}
.custom-badge{
  font-size:9px;text-transform:uppercase;letter-spacing:.08em;
  background:var(--lime);color:var(--charcoal);
  padding:1px 6px;border-radius:1px;margin-left:6px;font-weight:700;
}
.zone-controls{display:flex;align-items:center;gap:6px;margin-left:auto;}
.phase-select-sm{
  border:1.5px solid var(--border-light);border-radius:2px;
  padding:3px 6px;font-family:'Space Grotesk',sans-serif;font-size:11px;
  background:var(--surface2);color:var(--text);outline:none;cursor:pointer;
}
.zone-x{background:none;border:none;font-size:18px;color:var(--text-dim);cursor:pointer;line-height:1;padding:0 2px;}
.zone-x:hover{color:var(--efudix);}

.zone-body{padding:11px 14px;display:flex;flex-direction:column;gap:9px;}
.mini-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;font-weight:600;}
.ind-select{
  width:100%;border:1.5px solid var(--border-light);border-radius:2px;
  padding:6px 10px;font-family:'Space Grotesk',sans-serif;font-size:13px;
  background:var(--surface2);color:var(--text);outline:none;
}
.info-box{
  background:var(--bg2);border-radius:2px;border-left:2px solid var(--lime);
  padding:9px 12px;font-size:12px;color:var(--text-muted);line-height:1.55;
}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 14px;margin-bottom:6px;}
.info-item strong{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--lime);font-weight:700;margin-bottom:1px;opacity:.8;}
.info-note{font-size:11px;color:var(--text-dim);border-top:1px solid var(--border);padding-top:5px;}
.notes-ta{
  width:100%;border:1.5px solid var(--border-light);border-radius:2px;
  padding:8px 10px;font-family:'Space Grotesk',sans-serif;font-size:13px;
  background:var(--bg2);color:var(--text);outline:none;
  resize:vertical;min-height:54px;line-height:1.5;
}
.notes-ta::placeholder{color:var(--text-dim);}
.notes-ta:focus{border-color:var(--lime);}

/* ── Generate ── */
.gen-row{display:flex;align-items:center;justify-content:flex-end;gap:14px;margin-top:16px;}
.gen-hint{font-size:12px;color:var(--text-dim);}
.gen-btn{
  padding:12px 28px;border-radius:3px;border:none;
  background:var(--lime);color:var(--charcoal);
  font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;letter-spacing:.02em;transition:opacity .15s;
}
.gen-btn:hover{opacity:.85;} .gen-btn:disabled{opacity:.2;cursor:not-allowed;}

/* ── Reset ── */
.reset-btn{
  padding:6px 14px;border-radius:2px;
  border:1.5px solid var(--border-light);background:transparent;
  color:var(--text-muted);font-family:'Space Grotesk',sans-serif;
  font-size:12px;cursor:pointer;margin-left:8px;transition:all .15s;
}
.reset-btn:hover{border-color:var(--efudix);color:var(--efudix);}

/* ── PDF Modal ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.8);
  z-index:200;display:flex;align-items:flex-start;
  justify-content:center;padding:28px 16px;overflow-y:auto;
}
.modal{
  background:#F5F2ED;width:820px;max-width:100%;
  border-radius:3px;padding:48px 52px 56px;position:relative;
  color:#2E2B28;
}
.modal-close{
  position:absolute;top:14px;right:18px;background:none;
  border:none;font-size:24px;color:#8A8480;cursor:pointer;line-height:1;
}
.modal-close:hover{color:#2E2B28;}

.m-header{
  border-top:4px solid var(--charcoal);
  border-bottom:1px solid #D8D3CC;
  padding:20px 0 16px;margin-bottom:24px;
  display:flex;justify-content:space-between;align-items:flex-end;
}
.m-practice{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#6A6560;margin-bottom:5px;font-weight:600;}
.m-title{font-size:22px;font-weight:700;letter-spacing:-.03em;color:#2E2B28;}
.m-title em{font-style:normal;font-weight:300;}
.m-meta{text-align:right;font-size:12px;color:#6A6560;line-height:1.8;}
.m-meta strong{font-size:13px;color:#2E2B28;font-weight:700;display:block;}

.m-patient{
  background:#2E2B28;color:#F0EDE8;
  border-radius:3px;padding:14px 20px;
  margin-bottom:24px;display:flex;gap:28px;align-items:center;flex-wrap:wrap;
}
.m-patient .pl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(200,255,0,.6);margin-bottom:3px;font-weight:600;}
.m-patient .pv{font-size:15px;font-weight:600;}
.m-pdiv{width:1px;height:36px;background:rgba(255,255,255,.12);}

.m-slbl{
  font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  color:#8A8480;margin:22px 0 10px;
  padding-bottom:6px;border-bottom:1px solid #D8D3CC;font-weight:700;
}

.m-rx{background:#fff;border:1px solid #D8D3CC;border-radius:3px;padding:15px 18px;margin-bottom:8px;}
.m-rx-name{font-size:17px;font-weight:700;color:#2E2B28;letter-spacing:-.02em;}
.m-rx-name span{font-size:13px;font-weight:400;color:#6A6560;}
.m-rx-detail{font-size:12px;color:#6A6560;margin:3px 0 11px;}
.m-rx-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.m-rx-cell{background:#F0EDE8;border-radius:2px;padding:8px 10px;}
.m-rx-cell .cl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#8A8480;margin-bottom:2px;font-weight:700;}
.m-rx-cell .cv{font-size:12px;font-weight:600;color:#2E2B28;}

.m-tl-row{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.m-tl-pill{padding:3px 10px;border-radius:2px;font-size:11px;font-weight:700;min-width:68px;text-align:center;}
.m-tl-info{flex:1;font-size:12.5px;color:#3D3935;}
.m-tl-dates{font-size:11px;color:#8A8480;white-space:nowrap;}

.m-phase-block{margin-bottom:20px;}
.m-phase-hd{
  display:flex;align-items:center;gap:12px;
  padding:10px 14px;border-radius:3px 3px 0 0;
  border:1px solid #D8D3CC;border-bottom:none;
}
.m-phase-hd-pill{padding:3px 12px;border-radius:2px;font-size:11px;font-weight:700;letter-spacing:.06em;}
.m-phase-hd-dates{font-size:12px;color:#6A6560;margin-left:auto;}
.m-zone{background:#fff;border:1px solid #D8D3CC;padding:14px 16px;border-top:none;}
.m-zone:last-child{border-radius:0 0 3px 3px;}
.m-zone-head{font-size:14px;font-weight:700;margin-bottom:5px;color:#2E2B28;letter-spacing:-.01em;}
.m-ind-chip{display:inline-block;font-size:11px;padding:2px 9px;border-radius:2px;font-weight:600;margin-bottom:9px;}
.m-zone-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 20px;margin-bottom:7px;}
.m-zone-row{font-size:12.5px;color:#3D3935;} .m-zone-row span{color:#8A8480;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;margin-right:4px;}
.m-zone-clinote{font-size:12px;color:#6A6560;font-style:italic;border-top:1px solid #E8E4DF;padding-top:6px;margin-top:4px;}
.m-zone-drtext{background:#F0EDE8;border-radius:2px;border-left:3px solid #AFFE02;padding:8px 10px;margin-top:8px;font-size:12.5px;color:#3D3935;}
.m-zone-drtext strong{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#6A6560;margin-bottom:3px;font-weight:700;}

.m-gen{background:#fff;border:1px solid #D8D3CC;border-radius:3px;padding:14px 16px;}
.m-gen ul{padding-left:18px;}
.m-gen li{font-size:13px;margin-bottom:5px;line-height:1.55;color:#3D3935;}

.m-early{background:#fff;border:1.5px solid #FFD0C4;border-left:4px solid #FF5C3A;border-radius:3px;padding:15px 18px;}
.m-early-intro{font-size:13px;color:#2E2B28;margin-bottom:13px;line-height:1.55;padding-bottom:11px;border-bottom:1px solid #FFD0C4;}
.m-early-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:13px;}
.m-early-item{display:flex;gap:9px;align-items:flex-start;}
.m-early-icon{font-size:13px;flex-shrink:0;margin-top:1px;}
.m-early-head{font-size:13px;font-weight:600;color:#2E2B28;margin-bottom:2px;}
.m-early-body{font-size:11.5px;color:#6A6560;line-height:1.5;}
.m-early-footer{font-size:12px;color:#8A8480;font-style:italic;border-top:1px solid #FFD0C4;padding-top:9px;line-height:1.5;}

.m-footer{
  border-top:1px solid #D8D3CC;margin-top:32px;padding-top:14px;
  display:flex;justify-content:space-between;font-size:11px;color:#8A8480;
}
.sig-line{width:150px;height:1px;background:#D8D3CC;margin:20px 0 5px auto;}

.m-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.btn-back{
  padding:10px 20px;border-radius:3px;border:1.5px solid #D8D3CC;
  background:transparent;color:#6A6560;
  font-family:'Space Grotesk',sans-serif;font-size:13px;cursor:pointer;
}
.btn-print{
  padding:10px 24px;border-radius:3px;border:none;
  background:#AFFE02;color:#2E2B28;
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;cursor:pointer;
}
.btn-print:hover{opacity:.85;}



@media print {
  body{background:#fff;}
  .overlay{position:static;background:none;padding:0;display:block;}
  .modal{width:100%;border-radius:0;padding:24px;box-shadow:none;}
  .modal-close,.m-actions,.app-header,.app{display:none;}
}
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;

// ── Clinical data ──────────────────────────────────────────────────────────
const DRUGS = {
  efudix: {
    name: "Efudix® 5%", generic: "Fluorouracil 5% cream",

    },

const ZONES = [
  { id: "scalp",        label: "Scalp",                cx: 100, cy: 24,  rx: 22, ry: 18 },

  { id: "r_face",       label: "R Face",               cx: 122, cy: 60,  rx: 13, ry: 17 },
  { id: "nose",         label: "Nose",                 cx: 100, cy: 58,  rx: 6,  ry: 7  },
  { id: "neck_l",       label: "L Anterior Neck",      cx: 88,  cy: 90,  rx: 9,  ry: 7  },
  { id: "neck_r",       label: "R Anterior Neck",      cx: 112, cy: 90,  rx: 9,  ry: 7  },

// ── Helpers ────────────────────────────────────────────────────────────────
function addWeeks(dateStr, weeks) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  d.setDate(d.getDate() + weeks * 7);
  return d.toISOString().split("T")[0];
}

function fmtDate(dateStr) {
  if (!dateStr) return "—";
  return new Date(dateStr + "T00:00:00").toLocaleDateString("en-AU", { day: "2-digit", month: "short", year: "numeric" });
}

function fmtDateLong(dateStr) {
  if (!dateStr) return "—";
  return new Date(dateStr + "T00:00:00").toLocaleDateString("en-AU", { day: "2-digit", month: "long", year: "numeric" });
}

function computePhases(zones, startDate, drugKey) {
  const d = DRUGS[drugKey];
  const byPhase = {};
  zones.forEach(z => {
    if (!byPhase[z.phase]) byPhase[z.phase] = [];
    byPhase[z.phase].push(z);
  });
  const phases = Object.keys(byPhase).map(Number).sort((a, b) => a - b);
  const result = {};
  let cursor = startDate;
  phases.forEach(ph => {
    const zonesInPhase = byPhase[ph];
    const maxDuration = Math.max(...zonesInPhase.map(z => (d.indications[z.indication]?.durationWeeks || 4)));
    const maxGap = Math.max(...zonesInPhase.map(z => (d.indications[z.indication]?.gapWeeks || 6)));
    const phStart = cursor;
    const phEnd = addWeeks(cursor, maxDuration);
    result[ph] = { start: phStart, end: phEnd, nextStart: addWeeks(cursor, maxGap), zones: zonesInPhase, durationWeeks: maxDuration };
    cursor = result[ph].nextStart;
  });
  return result;
}

function shortLabel(label) {
  return label
    .replace("Anterior ", "Ant. ")
    .replace("Posterior ", "Post. ")
    .replace("Trapezius", "Trap.")
    .replace("Forearm", "FA")
    .replace("Dorsum", "Dors.")
    .replace("Décolletage", "Décoll.");
}

function maxPhase(zones) {
  return zones.length === 0 ? 1 : Math.max(...zones.map(z => z.phase));
}

      return arr;

              <rect x="138" y="158" width="26" height="44" rx="5" fill="#3A3632" stroke="#4A4540" strokeWidth="0.8"/>

              <ellipse cx="157" cy="210" rx="12" ry="9" fill="#3A3632" stroke="#4A4540" strokeWidth="0.8"/>
              <rect x="79" y="180" width="42" height="20" rx="5" fill="#3A3632" stroke="#4A4540" strokeWidth="0.8"/>
              <rect x="80" y="197" width="20" height="44" rx="5" fill="#3A3632" stroke="#4A4540" strokeWidth="0.8"/>
              <rect x="100" y="197" width="20" height="44" rx="5" fill="#3A3632" stroke="#4A4540" strokeWidth="0.8"/>
              <rect x="80" y="243" width="20" height="46" rx="5" fill="#3A3632" stroke="#4A4540" strokeWidth="0.8"/>
              <rect x="100" y="243" width="20" height="46" rx="5" fill="#3A3632" stroke="#4A4540" strokeWidth="0.8"/>

              {/* Interactive zones */}
              {ZONES.map(z => {
                const zone = zones.find(x => x.id === z.id);
                const active = !!zone;
                const col = active ? PHASE_COLS[(zone.phase - 1) % PHASE_COLS.length] : null;
                return (
                  <g key={z.id} onClick={() => toggleZone(z)} style={{cursor:"pointer"}}>
                    <ellipse cx={z.cx} cy={z.cy} rx={z.rx} ry={z.ry}
                      fill={active ? col : "transparent"}
                      fillOpacity={active ? 0.22 : 0}
                      stroke={active ? col : "#B8B0A6"}
                      strokeWidth={active ? 1.8 : 1}
                      strokeDasharray={active ? "none" : "3,2.5"} />
                    <text x={z.cx} y={z.cy + 0.5}
                      textAnchor="middle" dominantBaseline="middle"
                      fontSize="5" fill={active ? col : "#6A6560"}
                      fontFamily="Space Grotesk,sans-serif" fontWeight={active ? "600" : "400"}
                      style={{pointerEvents:"none",userSelect:"none"}}>

                                onChange={e => updateZone(z.id, "phase", Number(e.target.value))}>
                                {Array.from({length: numPhases + 1}, (_, i) => i + 1).map(p => (
                                  <option key={p} value={p}>Phase {p}</option>
                                ))}
                              </select>
                              <button className="zone-x" onClick={() => removeZone(z.id)}>×</button>
                            </div>
                          </div>
                          <div className="zone-body">
                            <div>
                              <div className="mini-lbl">Indication</div>
                              <select className="ind-select" value={z.indication}
                                onChange={e => updateZone(z.id, "indication", e.target.value)}>
                                {indKeys.map(k => <option key={k} value={k}>{d.indications[k].label}</option>)}
                              </select>
                            </div>
                            {ind && (
                              <div className="info-box">
                                <div className="info-grid">
                                  <div className="info-item"><strong>Frequency</strong>{ind.freq}</div>
                                  <div className="info-item"><strong>Duration</strong>{ind.durationLabel}</div>
                                  <div className="info-item"><strong>Reviews</strong>{ind.review}</div>
                                  <div className="info-item"><strong>Target</strong>{ind.target}</div>
                                </div>
                                <div className="info-note">{ind.note}</div>
                              </div>
                            )}
                            <div>
                              <div className="mini-lbl">Doctor's notes (optional)</div>
                              <textarea className="notes-ta"
                                placeholder="e.g. spot only, avoid periorbital area, patient tolerated well previously…"
                                value={z.notes}
                                onChange={e => updateZone(z.id, "notes", e.target.value)} />
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })
            )}

            <div className="gen-row">
              {!canGen && (
                <div className="gen-hint">
                  {!patientName.trim() ? "Enter patient name to continue"
                    : !startDate ? "Set a start date"
                    : "Select at least one treatment area"}
                </div>
              )}
              <button className="gen-btn" disabled={!canGen} onClick={() => setShowPDF(true)}>
                Generate PDF Plan →
              </button>
            </div>
          </div>
        </div>
      </div>

      {/* ── PDF Modal ── */}
      {showPDF && (
        <div className="overlay" onClick={e => e.target === e.currentTarget && setShowPDF(false)}>
          <div className="modal">
            <button className="modal-close" onClick={() => setShowPDF(false)}>×</button>

            {/* Header */}
            <div className="m-header">
              <div>
                <div className="m-practice">PS Health · Newstead</div>
                <div className="m-title">
                  <em style={{color:d.col}}>{d.name}</em> Treatment Plan
                </div>
              </div>
              <div className="m-meta">
                <strong>Dr H. Balachandran</strong>
                MBBS · FRACGP<br/>
                {fmtDateLong(todayISO)}
              </div>
            </div>

            {/* Patient strip */}
            <div className="m-patient">
              <div><div className="pl">Patient</div><div className="pv">{patientName}</div></div>
              {patientDOB && <><div className="m-pdiv"/><div><div className="pl">Date of Birth</div><div className="pv">{patientDOB}</div></div></>}
              <div><div className="pl">Treatment Start</div><div className="pv">{fmtDateLong(startDate)}</div></div>
              <div style={{marginLeft:"auto"}}><div className="pl">Total Phases</div><div className="pv">{phaseNums.length}</div></div>
            </div>

            {/* Prescription */}
            <div className="m-slbl">Prescription</div>
            <div className="m-rx">
              <div className="m-rx-name">{d.name} <span>({d.generic})</span></div>
              <div className="m-rx-detail">Private prescription · 40 g tube · 1 repeat per phase</div>
              <div className="m-rx-grid">
                <div className="m-rx-cell"><div className="cl">Drug</div><div className="cv">{d.name}</div></div>
                <div className="m-rx-cell"><div className="cl">Phases</div><div className="cv">{phaseNums.length} sequential course{phaseNums.length !== 1 ? "s" : ""}</div></div>
                <div className="m-rx-cell"><div className="cl">PBS Status</div><div className="cv">Private — not PBS listed</div></div>
              </div>
            </div>

            {/* Timeline overview */}
            <div className="m-slbl">Treatment Timeline</div>
            <div className="m-gen" style={{marginBottom:8}}>
              {phaseNums.map(ph => {
                const pd   = phaseData[ph];
                const col  = PHASE_COLS[(ph-1) % PHASE_COLS.length];
                const soft = PHASE_SOFT[(ph-1) % PHASE_SOFT.length];
                return (
                  <div key={ph} className="m-tl-row">
                    <div className="m-tl-pill" style={{background:soft,color:col}}>Phase {ph}</div>
                    <div className="m-tl-info">
                      {pd.zones.map(z => z.label).join(" + ")}
                      <span style={{color:"#9C9089"}}> · {pd.durationWeeks} week{pd.durationWeeks !== 1 ? "s" : ""}</span>
                    </div>
                    <div className="m-tl-dates">{fmtDate(pd.start)} → {fmtDate(pd.end)}</div>
                  </div>
                );
              })}
              {lastPhaseData && (
                <div style={{fontSize:12,color:"#9C9089",borderTop:"1px solid #E8E4DF",paddingTop:8,marginTop:8}}>
                  Estimated completion: <strong style={{color:"#1C1814"}}>{fmtDateLong(lastPhaseData.end)}</strong>
                  &nbsp;·&nbsp; Final review: <strong style={{color:"#1C1814"}}>{fmtDateLong(addWeeks(lastPhaseData.end, 8))}</strong>
                </div>
              )}
            </div>

            {/* Phase details */}
            <div className="m-slbl">Treatment Areas by Phase</div>
            {phaseNums.map(ph => {
              const pd   = phaseData[ph];
              const col  = PHASE_COLS[(ph-1) % PHASE_COLS.length];
              const soft = PHASE_SOFT[(ph-1) % PHASE_SOFT.length];
              return (
                <div key={ph} className="m-phase-block">
                  <div className="m-phase-hd" style={{background:soft,borderColor:col+"33"}}>
                    <span className="m-phase-hd-pill" style={{background:col,color:"#fff"}}>Phase {ph}</span>
                    <span style={{fontSize:13,color:"#1C1814",fontWeight:500}}>
                      {pd.zones.map(z => z.label).join(" + ")}
                    </span>
                    <span className="m-phase-hd-dates">{fmtDate(pd.start)} → {fmtDate(pd.end)} · {pd.durationWeeks} weeks</span>
                  </div>
                  {pd.zones.map(z => {
                    const ind = d.indications[z.indication];
                    return (
                      <div key={z.id} className="m-zone">
                        <div className="m-zone-head" style={{color:col}}>{z.label}</div>
                        <div className="m-ind-chip" style={{background:soft,color:col}}>{ind.label}</div>
                        <div className="m-zone-grid">
                          <div className="m-zone-row"><span>Frequency: </span>{ind.freq}</div>
                          <div className="m-zone-row"><span>Duration: </span>{ind.durationLabel}</div>
                          <div className="m-zone-row"><span>Reviews: </span>{ind.review}</div>
                          <div className="m-zone-row"><span>Target: </span>{ind.target}</div>
                        </div>
                        <div className="m-zone-clinote">{ind.note}</div>
                        {z.notes.trim() && (
                          <div className="m-zone-drtext">
                            <strong>Doctor's Notes</strong>{z.notes}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })}

            {/* General instructions */}
            <div className="m-slbl">General Instructions</div>
            <div className="m-gen">
              <ul>
                {drug === "efudix" ? (<>
                  <li>Apply as a <strong>fine smear</strong> using a gloved finger. Avoid heavy rubbing.</li>
                  <li>Wash hands thoroughly after every application.</li>
                  <li>Avoid eyes, nostrils, and lips. <strong>Do not use occlusive dressings.</strong></li>
                  <li>Apply evening dose at least 2–3 hours before bed to avoid rubbing onto pillowcase.</li>
                  <li>Redness begins day 4–5 — expected. <strong>Do not stop at redness only.</strong> Wait for dark adherent scabs (erosive stage), then stop.</li>
                  <li>Once stopped: apply <strong>Advantan Fatty Ointment®</strong> to reduce discomfort. Healing takes ~2 weeks.</li>
                  <li>Allow skin to <strong>fully heal</strong> before starting the next phase — wait until all crusting has resolved.</li>
                  <li>Avoid direct sun exposure to treated areas during each course.</li>
                  <li><strong>Do not use if pregnant or trying to conceive.</strong></li>
                  <li>Any lesion persisting 6–8 weeks post-treatment must be reviewed — biopsy may be required.</li>
                </>) : (<>
                  <li>Apply once daily to the affected area <strong>on scheduled days only</strong> — do not apply on off days.</li>
                  <li>Use a gloved finger. Do not wash the treated area for <strong>8 hours</strong> after application.</li>
                  <li>Avoid eyes, nostrils, and lips. Treatment area limited to <strong>25 cm²</strong> per site.</li>
                  <li>A crusting reaction indicates the end of treatment — do not continue once this occurs.</li>
                  <li>Allow skin to <strong>fully heal</strong> before starting the next phase — minimum 4 weeks between courses.</li>
                  <li>Systemic flu-like symptoms may occur if the 25 cm² field limit is exceeded.</li>
                  <li><strong>Do not use if pregnant or trying to conceive.</strong></li>
                  <li>Any lesion persisting at review must be reassessed — biopsy may be required.</li>
                </>)}
              </ul>
            </div>

            {/* Early review */}
            <div className="m-slbl" style={{color:"#C4503A",borderBottomColor:"#F0E0DC"}}>⚠ Book an Earlier Appointment If…</div>
            <div className="m-early">
              <div className="m-early-intro">
                The following are <strong>not</strong> normal parts of treatment. If any occur, <strong>stop the cream and contact the practice</strong> to arrange an earlier review. You can send a photo via the practice messaging system.
              </div>
              <div className="m-early-grid">
                {[
                  ["🔴","Signs of infection","Increasing warmth, swelling, pus, or weeping that is not settling"],
                  ["🔴","Spreading redness","Redness or crusting spreading well beyond the intended treatment area"],
                  ["🔴","Severe pain","Discomfort is expected — severe pain not controlled with paracetamol is not"],
                  ["🔴","Fever or flu-like symptoms","Feeling unwell or shivering — especially relevant with Aldara"],
                  ["🟡","No reaction by day 10","Contact us — the cream may not be absorbing correctly"],
                  ["🟡","Reaction near eyes, lips, or nostrils","Significant irritation or swelling from accidental contact"],
                  ["🟡","Allergic reaction","Widespread rash, hives, or unusual swelling — stop immediately"],
                  ["🟡","Concerned about a lesion","A spot that looks different, is growing, bleeding, or not behaving as expected"],
                ].map(([icon, head, body]) => (
                  <div key={head} className="m-early-item">
                    <div className="m-early-icon">{icon}</div>
                    <div>
                      <div className="m-early-head">{head}</div>
                      <div className="m-early-body">{body}</div>
                    </div>
                  </div>
                ))}
              </div>
              <div className="m-early-footer">
                For non-urgent questions, photos can be sent via the practice. For urgent concerns, call the practice during business hours or present to your nearest Emergency Department after hours.
              </div>
            </div>

            {/* Footer */}
            <div className="m-footer">
              <div>
                PS Health Newstead<br/>
                Ongoing skin surveillance recommended every 6–12 months.
              </div>
              <div style={{textAlign:"right"}}>
                <div className="sig-line"/>
                Dr H. Balachandran MBBS · FRACGP<br/>
                Date: {fmtDateLong(todayISO)}
              </div>
            </div>

            <div className="m-actions">
              <button className="btn-back" onClick={() => setShowPDF(false)}>← Edit</button>
              <button className="btn-print" onClick={() => window.print()}>🖨 Print / Save as PDF</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
