<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topical Treatment Builder — Dr H. Balachandran</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#F0EDE8;color:#1C1814;min-height:100vh;}

.app-header{background:#AFFF00;color:#3A3535;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100;border-bottom:2px solid #99e000;}
.hdr-left{display:flex;align-items:center;gap:16px;}
.hdr-ps-mark{display:flex;align-items:center;gap:0;flex-shrink:0;}
.hdr-ps-text{font-family:'DM Sans',sans-serif;font-size:26px;font-weight:700;color:#3A3535;letter-spacing:-.04em;line-height:1;}
.hdr-ps-circles{display:flex;flex-direction:column;gap:2px;margin-left:2px;}
.hdr-ps-circle{width:11px;height:11px;border-radius:50%;background:#3A3535;}
.hdr-tagline{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;color:#3A3535;opacity:.65;line-height:1.4;letter-spacing:.01em;}
.hdr-div{width:1px;height:24px;background:rgba(58,53,53,.2);}
.hdr-tool-name{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:#3A3535;letter-spacing:.01em;}
.hdr-tool-sub{font-size:10px;color:#3A3535;opacity:.6;letter-spacing:.04em;margin-top:1px;}
.hdr-right{font-size:11px;color:#3A3535;opacity:.7;text-align:right;line-height:1.7;}
.hdr-right strong{color:#3A3535;opacity:1;font-size:12px;display:block;font-weight:600;}

.app{max-width:1160px;margin:0 auto;padding:32px 24px 100px;}

.step-row{margin-bottom:28px;}
.step-lbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#B8AFA6;margin-bottom:10px;}

.patient-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#6B6157;}
.fg input{border:1.5px solid #DDD6CE;border-radius:4px;padding:9px 14px;font-family:'DM Sans',sans-serif;font-size:14px;background:#fff;color:#1C1814;outline:none;transition:border-color .15s;}
.fg input:focus{border-color:#1C1814;}
.fg.w220 input{width:220px;} .fg.w160 input{width:160px;} .fg.w140 input{width:140px;}

.drug-row{display:flex;gap:10px;}
.drug-btn{flex:1;padding:14px 18px;border-radius:6px;border:2px solid #DDD6CE;background:#fff;cursor:pointer;text-align:left;transition:all .15s;}
.drug-btn:hover{border-color:#B8AFA6;}
.drug-btn.sel-efudix{border-color:#C4503A;background:#FBF0EE;}
.drug-btn.sel-aldara{border-color:#3A6B4C;background:#EBF3EE;}
.drug-name{font-family:'Libre Baskerville',serif;font-size:16px;font-weight:700;}
.drug-gen{font-size:12px;color:#6B6157;margin-top:2px;}

.builder{display:grid;grid-template-columns:230px 1fr;gap:24px;align-items:start;}

.diagram-card{background:#fff;border-radius:8px;border:1px solid #DDD6CE;padding:14px;position:sticky;top:68px;}
.diagram-hint{font-size:11px;color:#B8AFA6;text-align:center;margin-bottom:8px;}
.phase-legend{margin-top:10px;display:flex;flex-direction:column;gap:4px;}
.legend-item{display:flex;align-items:center;gap:7px;padding:4px 8px;border-radius:4px;}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.legend-name{font-size:11px;font-weight:500;}
.legend-date{font-size:10px;color:#9C9089;margin-left:auto;}

.zones-col{display:flex;flex-direction:column;gap:0;}

.free-zone-row{display:flex;gap:8px;margin-bottom:14px;align-items:center;}
.free-zone-input{flex:1;border:1.5px solid #DDD6CE;border-radius:4px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:13px;background:#fff;color:#1C1814;outline:none;}
.free-zone-input::placeholder{color:#C0B8B0;}
.free-zone-input:focus{border-color:#1C1814;outline:none;}
.free-zone-add{padding:9px 16px;border-radius:4px;border:none;background:#1C1814;color:#FAF7F2;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;white-space:nowrap;}
.free-zone-add:hover{opacity:.8;} .free-zone-add:disabled{opacity:.35;cursor:not-allowed;}

.empty-state{background:#fff;border:1.5px dashed #DDD6CE;border-radius:6px;padding:48px 24px;text-align:center;color:#B8AFA6;font-size:14px;margin-bottom:12px;}
.empty-icon{font-size:28px;margin-bottom:8px;}

.timeline-preview{background:#fff;border:1px solid #DDD6CE;border-radius:6px;padding:16px 18px;margin-bottom:16px;}
.tl-title{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#B8AFA6;margin-bottom:12px;}
.tl-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.tl-row:last-child{margin-bottom:0;}
.tl-pill{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap;min-width:66px;text-align:center;}
.tl-bar-wrap{flex:1;height:26px;background:#F5F2EE;border-radius:4px;overflow:hidden;}
.tl-bar{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 9px;}
.tl-bar-label{font-size:10.5px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tl-dates{font-size:10.5px;color:#9C9089;white-space:nowrap;}

.phase-section{margin-bottom:12px;}
.phase-header{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:5px 5px 0 0;background:#F5F2EE;border:1.5px solid #DDD6CE;border-bottom:none;}
.phase-pill{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500;letter-spacing:.06em;}
.phase-dates{font-size:12px;color:#6B6157;margin-left:auto;}

.zone-card{background:#fff;border:1.5px solid #DDD6CE;border-top:none;overflow:hidden;}
.zone-card:last-child{border-radius:0 0 5px 5px;}
.zone-hd{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#FAFAF8;cursor:grab;user-select:none;}
.zone-hd:active{cursor:grabbing;}
.drag-handle{color:#C0B8B0;font-size:14px;flex-shrink:0;}
.zone-phase-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.zone-lbl{font-size:13.5px;font-weight:500;flex:1;}
.custom-badge{font-size:10px;text-transform:uppercase;background:#F0EDE8;color:#9C9089;padding:1px 6px;border-radius:8px;margin-left:4px;}
.zone-controls{display:flex;align-items:center;gap:6px;margin-left:auto;}
.phase-select-sm{border:1.5px solid #DDD6CE;border-radius:4px;padding:3px 6px;font-family:'DM Sans',sans-serif;font-size:11px;background:#F5F2EE;color:#1C1814;outline:none;cursor:pointer;}
.zone-x{background:none;border:none;font-size:18px;color:#C0B8B0;cursor:pointer;line-height:1;padding:0 2px;}
.zone-x:hover{color:#C4503A;}

.zone-body{padding:11px 14px;display:flex;flex-direction:column;gap:9px;}
.mini-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#B8AFA6;margin-bottom:4px;}
.ind-select{width:100%;border:1.5px solid #DDD6CE;border-radius:4px;padding:6px 10px;font-family:'DM Sans',sans-serif;font-size:13px;background:#F5F2EE;color:#1C1814;outline:none;}
.info-box{background:#F5F2EE;border-radius:4px;padding:9px 12px;font-size:12px;color:#6B6157;line-height:1.55;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 14px;margin-bottom:6px;}
.info-item strong{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#9C9089;font-weight:500;margin-bottom:1px;}
.info-note{font-size:11px;color:#8B7E74;border-top:1px solid #DDD6CE;padding-top:5px;}
.notes-ta{width:100%;border:1.5px solid #DDD6CE;border-radius:4px;padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:13px;background:#fff;color:#1C1814;outline:none;resize:vertical;min-height:54px;line-height:1.5;}
.notes-ta::placeholder{color:#C0B8B0;}

.gen-row{display:flex;align-items:center;justify-content:flex-end;gap:14px;margin-top:16px;}
.gen-hint{font-size:12px;color:#B8AFA6;}
.gen-btn{padding:12px 28px;border-radius:5px;border:none;background:#1C1814;color:#FAF7F2;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;letter-spacing:.02em;}
.gen-btn:hover{opacity:.85;} .gen-btn:disabled{opacity:.35;cursor:not-allowed;}

/* ── PDF / Print modal ── */
.overlay{position:fixed;inset:0;background:rgba(28,24,20,.65);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:28px 16px;overflow-y:auto;}
.modal{background:#FAF7F2;width:820px;max-width:100%;border-radius:6px;padding:48px 52px 56px;position:relative;}
.modal-close{position:absolute;top:14px;right:18px;background:none;border:none;font-size:24px;color:#9C9089;cursor:pointer;line-height:1;}
.modal-close:hover{color:#1C1814;}

.m-header{border-top:3px solid #1C1814;border-bottom:1px solid #DDD6CE;padding:20px 0 16px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:flex-end;}
.m-practice{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#6B6157;margin-bottom:5px;}
.m-title{font-family:'Libre Baskerville',serif;font-size:22px;font-weight:700;}
.m-title em{font-style:italic;}
.m-meta{text-align:right;font-size:12px;color:#6B6157;line-height:1.8;}
.m-meta strong{font-family:'Libre Baskerville',serif;font-size:13px;color:#1C1814;display:block;}

.m-patient{background:#1C1814;color:#FAF7F2;border-radius:4px;padding:14px 20px;margin-bottom:24px;display:flex;gap:28px;align-items:center;flex-wrap:wrap;}
.m-patient .pl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#B8AFA6;margin-bottom:3px;}
.m-patient .pv{font-family:'Libre Baskerville',serif;font-size:15px;}
.m-pdiv{width:1px;height:36px;background:rgba(255,255,255,.15);}

.m-slbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#B8AFA6;margin:22px 0 10px;padding-bottom:6px;border-bottom:1px solid #DDD6CE;}

.m-rx{background:#fff;border:1px solid #DDD6CE;border-radius:4px;padding:15px 18px;margin-bottom:8px;}
.m-rx-name{font-family:'Libre Baskerville',serif;font-size:17px;font-weight:700;}
.m-rx-name span{font-size:13px;font-weight:400;font-style:italic;color:#6B6157;}
.m-rx-detail{font-size:12px;color:#6B6157;margin:3px 0 11px;}
.m-rx-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.m-rx-cell{background:#F5F2EE;border-radius:3px;padding:8px 10px;}
.m-rx-cell .cl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#B8AFA6;margin-bottom:2px;}
.m-rx-cell .cv{font-size:12px;font-weight:500;}

.m-tl-row{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.m-tl-pill{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:500;min-width:68px;text-align:center;}
.m-tl-info{flex:1;font-size:12.5px;}
.m-tl-dates{font-size:11px;color:#9C9089;white-space:nowrap;}

.m-phase-block{margin-bottom:20px;}
.m-phase-hd{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:4px 4px 0 0;border:1px solid #DDD6CE;border-bottom:none;}
.m-phase-hd-pill{padding:3px 12px;border-radius:10px;font-size:11px;font-weight:600;letter-spacing:.06em;}
.m-phase-hd-dates{font-size:12px;color:#6B6157;margin-left:auto;}
.m-zone{background:#fff;border:1px solid #DDD6CE;padding:14px 16px;border-top:none;}
.m-zone:last-child{border-radius:0 0 4px 4px;}
.m-zone-head{font-size:14px;font-weight:600;margin-bottom:5px;}
.m-ind-chip{display:inline-block;font-size:11px;padding:2px 9px;border-radius:10px;font-weight:500;margin-bottom:9px;}
.m-zone-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 20px;margin-bottom:7px;}
.m-zone-row{font-size:12.5px;} .m-zone-row span{color:#6B6157;}
.m-zone-clinote{font-size:12px;color:#6B6157;font-style:italic;border-top:1px solid #EEEBE6;padding-top:6px;margin-top:4px;}
.m-zone-drtext{background:#F5F2EE;border-radius:3px;padding:8px 10px;margin-top:8px;font-size:12.5px;}
.m-zone-drtext strong{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#6B6157;margin-bottom:3px;}

.m-gen{background:#fff;border:1px solid #DDD6CE;border-radius:4px;padding:14px 16px;}
.m-gen ul{padding-left:18px;}
.m-gen li{font-size:13px;margin-bottom:5px;line-height:1.55;}

.m-early{background:#fff;border:1.5px solid #F0D8D4;border-left:4px solid #C4503A;border-radius:4px;padding:15px 18px;}
.m-early-intro{font-size:13px;color:#1C1814;margin-bottom:13px;line-height:1.55;padding-bottom:11px;border-bottom:1px solid #F0E0DC;}
.m-early-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:13px;}
.m-early-item{display:flex;gap:9px;align-items:flex-start;}
.m-early-icon{font-size:13px;flex-shrink:0;margin-top:1px;}
.m-early-head{font-size:13px;font-weight:500;color:#1C1814;margin-bottom:2px;}
.m-early-body{font-size:11.5px;color:#6B6157;line-height:1.5;}
.m-early-footer{font-size:12px;color:#9C9089;font-style:italic;border-top:1px solid #F0E0DC;padding-top:9px;line-height:1.5;}

.m-footer{border-top:1px solid #DDD6CE;margin-top:32px;padding-top:14px;display:flex;justify-content:space-between;font-size:11px;color:#B8AFA6;}
.sig-line{width:150px;height:1px;background:#DDD6CE;margin:20px 0 5px auto;}

.m-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.btn-back{padding:10px 20px;border-radius:4px;border:1.5px solid #DDD6CE;background:transparent;color:#6B6157;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}
.btn-print{padding:10px 24px;border-radius:4px;border:none;background:#1C1814;color:#FAF7F2;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}
.btn-print:hover{opacity:.85;}

/* ── Reset button ── */
.reset-btn{padding:6px 14px;border-radius:4px;border:1.5px solid #DDD6CE;background:transparent;color:#9C9089;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;margin-left:8px;}
.reset-btn:hover{border-color:#C4503A;color:#C4503A;}

@media print {
  body{background:#fff;}
  .overlay{position:static;background:none;padding:0;display:block;}
  .modal{width:100%;border-radius:0;padding:24px;box-shadow:none;}
  .modal-close,.m-actions,.app-header,.app{display:none;}
}
</style>
</head>

<script type="text/babel">
const { useState, useRef } = React;

// ── Clinical data ──────────────────────────────────────────────────────────

// ── Helpers ────────────────────────────────────────────────────────────────
function addWeeks(dateStr, weeks) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  d.setDate(d.getDate() + weeks * 7);
  return d.toISOString().split("T")[0];
}

function fmtDate(dateStr) {
  if (!dateStr) return "—";
  return new Date(dateStr + "T00:00:00").toLocaleDateString("en-AU", { day: "2-digit", month: "short", year: "numeric" });
}

function fmtDateLong(dateStr) {
  if (!dateStr) return "—";
  return new Date(dateStr + "T00:00:00").toLocaleDateString("en-AU", { day: "2-digit", month: "long", year: "numeric" });
}

function computePhases(zones, startDate, drugKey) {
  const d = DRUGS[drugKey];
  const byPhase = {};
  zones.forEach(z => {
    if (!byPhase[z.phase]) byPhase[z.phase] = [];
    byPhase[z.phase].push(z);
  });
  const phases = Object.keys(byPhase).map(Number).sort((a, b) => a - b);
  const result = {};
  let cursor = startDate;
  phases.forEach(ph => {
    const zonesInPhase = byPhase[ph];
    const maxDuration = Math.max(...zonesInPhase.map(z => (d.indications[z.indication]?.durationWeeks || 4)));
    const maxGap = Math.max(...zonesInPhase.map(z => (d.indications[z.indication]?.gapWeeks || 6)));
    const phStart = cursor;
    const phEnd = addWeeks(cursor, maxDuration);
    result[ph] = { start: phStart, end: phEnd, nextStart: addWeeks(cursor, maxGap), zones: zonesInPhase, durationWeeks: maxDuration };
    cursor = result[ph].nextStart;
  });
  return result;
}

function shortLabel(label) {
  return label
    .replace("Anterior ", "Ant. ")
    .replace("Posterior ", "Post. ")
    .replace("Trapezius", "Trap.")
    .replace("Forearm", "FA")
    .replace("Dorsum", "Dors.")
    .replace("Décolletage", "Décoll.");
}

function maxPhase(zones) {
  return zones.length === 0 ? 1 : Math.max(...zones.map(z => z.phase));
}

const todayISO = new Date().toISOString().split("T")[0];

  const [startDate, setStartDate]     = useState(todayISO);
  const [freeText, setFreeText]       = useState("");
  const [showPDF, setShowPDF]         = useState(false);
  const dragId     = useRef(null);
  const dragOverId = useRef(null);

  const d       = DRUGS[drug];
  const indKeys = Object.keys(d.indications);
  const phaseData = computePhases(zones, startDate, drug);
  const phaseNums = [...new Set(zones.map(z => z.phase))].sort((a, b) => a - b);
  const numPhases = maxPhase(zones);
  const canGen    = patientName.trim() && zones.length > 0 && startDate;

  function toggleZone(zone) {
    setZones(prev => {
      if (prev.find(z => z.id === zone.id)) return prev.filter(z => z.id !== zone.id);
      return [...prev, { id: zone.id, label: zone.label, indication: indKeys[0], notes: "", custom: false, phase: maxPhase(prev) || 1 }];
    });
  }

  function addFreeZone() {
    const text = freeText.trim();
    if (!text) return;
    setZones(prev => [...prev, { id: "custom_" + Date.now(), label: text, indication: indKeys[0], notes: "", custom: true, phase: maxPhase(prev) || 1 }]);
    setFreeText("");
  }

  function updateZone(id, field, val) {
    setZones(prev => prev.map(z => z.id === id ? { ...z, [field]: val } : z));
  }

  function removeZone(id) { setZones(prev => prev.filter(z => z.id !== id)); }

  function onDragStart(e, id) { dragId.current = id; e.dataTransfer.effectAllowed = "move"; }
  function onDragOver(e, id)  { e.preventDefault(); dragOverId.current = id; }
  function onDrop(e) {
    e.preventDefault();
    const from = dragId.current, to = dragOverId.current;
    if (!from || !to || from === to) return;
    setZones(prev => {
      const arr = [...prev];
      const fi = arr.findIndex(z => z.id === from);
      const ti = arr.findIndex(z => z.id === to);
      const [item] = arr.splice(fi, 1);
      arr.splice(ti, 0, item);
      return arr;
    });
    dragId.current = dragOverId.current = null;
  }

  function resetAll() {
    setPatientName(""); setPatientDOB(""); setZones([]); setFreeText(""); setStartDate(todayISO);
  }

  const isActive = id => zones.some(z => z.id === id);
  const lastPhaseData = phaseData[phaseNums[phaseNums.length - 1]];

          <div className="patient-row">
            <div className="fg w220">
              <label>Patient Name</label>
              <input value={patientName} onChange={e => setPatientName(e.target.value)} placeholder="Full name" />
            </div>
            <div className="fg w140">
              <label>Date of Birth</label>
              <input value={patientDOB} onChange={e => setPatientDOB(e.target.value)} placeholder="DD/MM/YYYY" />
            </div>
            <div className="fg w160">
              <label>Phase 1 Start Date</label>
              <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} />
            </div>
            <button className="reset-btn" onClick={resetAll}>↺ New patient</button>
          </div>
        </div>

        {/* Step 2 */}
        <div className="step-row">
          <div className="step-lbl">Step 2 — Select Treatment</div>
          <div className="drug-row">
            {Object.entries(DRUGS).map(([key, data]) => (
              <button key={key}
                className={`drug-btn ${drug === key ? `sel-${key}` : ""}`}
                onClick={() => { setDrug(key); setZones([]); }}>
                <div className="drug-name" style={{ color: drug === key ? data.col : "#1C1814" }}>{data.name}</div>
                <div className="drug-gen">{data.generic}</div>
              </button>
            ))}
          </div>
        </div>

        {/* Step 3 */}
        <div className="step-lbl">Step 3 — Select Treatment Areas, Assign Phases & Drag to Reorder</div>
        <div className="builder">

          {/* Diagram */}
          <div className="diagram-card">
            <div className="diagram-hint">Tap a zone to select / deselect</div>
            <svg viewBox="0 0 200 340" width="100%" style={{display:"block"}}>
              {/* Silhouette */}
              <ellipse cx="100" cy="24" rx="22" ry="20" fill="#E8E4DF" stroke="#D4CCC4" strokeWidth="0.8"/>
              <rect x="91" y="44" width="18" height="20" rx="3" fill="#E8E4DF" stroke="#D4CCC4" strokeWidth="0.8"/>
              <rect x="72" y="92" width="56" height="88" rx="6" fill="#E8E4DF" stroke="#D4CCC4" strokeWidth="0.8"/>
              <rect x="38" y="102" width="32" height="54" rx="6" fill="#E8E4DF" stroke="#D4CCC4" strokeWidth="0.8"/>
              <rect x="130" y="102" width="32" height="54" rx="6" fill="#E8E4DF" stroke="#D4CCC4" strokeWidth="0.8"/>
              <rect x="36" y="158" width="26" height="44" rx="5" fill="#E8E4DF" stroke="#D4CCC4" strokeWidth="0.8"/>
              <rect x="138" y="158" width="26" height="44" rx="5" fill="#E8E4DF" stroke="#D4CCC4" strokeWidth="0.8"/>
              <ellipse cx="43" cy="210" rx="12" ry="9" fill="#E8E4DF" stroke="#D4CCC4" strokeWidth="0.8"/>
              <ellipse cx="157" cy="210" rx="12" ry="9" fill="#E8E4DF" stroke="#D4CCC4" strokeWidth="0.8"/>
              <rect x="79" y="180" width="42" height="20" rx="5" fill="#E8E4DF" stroke="#D4CCC4" strokeWidth="0.8"/>
              <rect x="80" y="197" width="20" height="44" rx="5" fill="#E8E4DF" stroke="#D4CCC4" strokeWidth="0.8"/>
              <rect x="100" y="197" width="20" height="44" rx="5" fill="#E8E4DF" stroke="#D4CCC4" strokeWidth="0.8"/>
              <rect x="80" y="243" width="20" height="46" rx="5" fill="#E8E4DF" stroke="#D4CCC4" strokeWidth="0.8"/>
              <rect x="100" y="243" width="20" height="46" rx="5" fill="#E8E4DF" stroke="#D4CCC4" strokeWidth="0.8"/>

              {/* Interactive zones */}
              {ZONES.map(z => {
                const zone = zones.find(x => x.id === z.id);
                const active = !!zone;
                const col = active ? PHASE_COLS[(zone.phase - 1) % PHASE_COLS.length] : null;
                return (
                  <g key={z.id} onClick={() => toggleZone(z)} style={{cursor:"pointer"}}>
                    <ellipse cx={z.cx} cy={z.cy} rx={z.rx} ry={z.ry}
                      fill={active ? col : "transparent"}
                      fillOpacity={active ? 0.22 : 0}
                      stroke={active ? col : "#B8B0A6"}
                      strokeWidth={active ? 1.8 : 1}
                      strokeDasharray={active ? "none" : "3,2.5"} />
                    <text x={z.cx} y={z.cy + 0.5}
                      textAnchor="middle" dominantBaseline="middle"
                      fontSize="5" fill={active ? col : "#9C9089"}
                      fontFamily="DM Sans,sans-serif" fontWeight={active ? "500" : "300"}
                      style={{pointerEvents:"none",userSelect:"none"}}>
                      {shortLabel(z.label)}
                    </text>
                    {active && (
                      <text x={z.cx} y={z.cy + z.ry - 5}
                        textAnchor="middle" dominantBaseline="middle"
                        fontSize="5.5" fill={col}
                        fontFamily="DM Sans,sans-serif" fontWeight="600"
                        style={{pointerEvents:"none",userSelect:"none"}}>
                        P{zone.phase}
                      </text>
                    )}
                  </g>
                );
              })}
            </svg>

            {/* Phase legend */}
            {zones.length > 0 && (
              <div className="phase-legend">
                {phaseNums.map(ph => {
                  const col = PHASE_COLS[(ph-1) % PHASE_COLS.length];
                  const soft = PHASE_SOFT[(ph-1) % PHASE_SOFT.length];
                  const pd = phaseData[ph];
                  return (
                    <div key={ph} className="legend-item" style={{background:soft}}>
                      <div className="legend-dot" style={{background:col}}/>
                      <span className="legend-name" style={{color:col}}>Phase {ph}</span>
                      {pd && <span className="legend-date">{fmtDate(pd.start)}</span>}
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Right column */}
          <div className="zones-col">

            {/* Free text entry */}
            <div className="free-zone-row">
              <input className="free-zone-input"
                placeholder="Type a spot — e.g. L temple, R dorsal hand, tip of nose…"
                value={freeText}
                onChange={e => setFreeText(e.target.value)}
                onKeyDown={e => e.key === "Enter" && addFreeZone()} />
              <button className="free-zone-add" disabled={!freeText.trim()} onClick={addFreeZone}>+ Add Spot</button>
            </div>

            {/* Timeline preview */}
            {zones.length > 0 && startDate && (
              <div className="timeline-preview">
                <div className="tl-title">Treatment Timeline</div>
                {phaseNums.map(ph => {
                  const pd = phaseData[ph];
                  if (!pd) return null;
                  const col = PHASE_COLS[(ph-1) % PHASE_COLS.length];
                  const soft = PHASE_SOFT[(ph-1) % PHASE_SOFT.length];
                  return (
                    <div key={ph} className="tl-row">
                      <div className="tl-pill" style={{background:soft,color:col}}>Phase {ph}</div>
                      <div className="tl-bar-wrap">
                        <div className="tl-bar" style={{background:col,width:`${Math.min(100, pd.durationWeeks/8*100)}%`,minWidth:60}}>
                          <span className="tl-bar-label">{pd.zones.map(z=>z.label).join(", ")}</span>
                        </div>
                      </div>
                      <div className="tl-dates">{fmtDate(pd.start)} → {fmtDate(pd.end)}</div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Zone cards */}
            {zones.length === 0 ? (
              <div className="empty-state">
                <div className="empty-icon">👆</div>
                Type a spot above or tap the body diagram to add treatment areas
              </div>
            ) : (
              phaseNums.map(ph => {
                const col  = PHASE_COLS[(ph-1) % PHASE_COLS.length];
                const soft = PHASE_SOFT[(ph-1) % PHASE_SOFT.length];
                const pd   = phaseData[ph];
                const zonesInPhase = zones.filter(z => z.phase === ph);
                return (
                  <div key={ph} className="phase-section">
                    <div className="phase-header" style={{borderColor:col}}>
                      <span className="phase-pill" style={{background:soft,color:col}}>Phase {ph}</span>
                      {pd && <span className="phase-dates">{fmtDate(pd.start)} — {fmtDate(pd.end)} · {pd.durationWeeks} weeks</span>}
                    </div>
                    {zonesInPhase.map(z => {
                      const ind = d.indications[z.indication];
                      return (
                        <div key={z.id} className="zone-card"
                          draggable
                          onDragStart={e => onDragStart(e, z.id)}
                          onDragOver={e => onDragOver(e, z.id)}
                          onDrop={onDrop}>
                          <div className="zone-hd">
                            <span className="drag-handle">⠿</span>
                            <div className="zone-phase-dot" style={{background:col}}/>
                            <div className="zone-lbl">
                              {z.label}
                              {z.custom && <span className="custom-badge">spot</span>}
                            </div>
                            <div className="zone-controls">
                              <select className="phase-select-sm" value={z.phase}
                                onChange={e => updateZone(z.id, "phase", Number(e.target.value))}>
                                {Array.from({length: numPhases + 1}, (_, i) => i + 1).map(p => (
                                  <option key={p} value={p}>Phase {p}</option>
                                ))}
                              </select>
                              <button className="zone-x" onClick={() => removeZone(z.id)}>×</button>
                            </div>
                          </div>
                          <div className="zone-body">
                            <div>
                              <div className="mini-lbl">Indication</div>
                              <select className="ind-select" value={z.indication}
                                onChange={e => updateZone(z.id, "indication", e.target.value)}>
                                {indKeys.map(k => <option key={k} value={k}>{d.indications[k].label}</option>)}
                              </select>
                            </div>
                            {ind && (
                              <div className="info-box">
                                <div className="info-grid">
                                  <div className="info-item"><strong>Frequency</strong>{ind.freq}</div>
                                  <div className="info-item"><strong>Duration</strong>{ind.durationLabel}</div>
                                  <div className="info-item"><strong>Reviews</strong>{ind.review}</div>
                                  <div className="info-item"><strong>Target</strong>{ind.target}</div>
                                </div>
                                <div className="info-note">{ind.note}</div>
                              </div>
                            )}
                            <div>
                              <div className="mini-lbl">Doctor's notes (optional)</div>
                              <textarea className="notes-ta"
                                placeholder="e.g. spot only, avoid periorbital area, patient tolerated well previously…"
                                value={z.notes}
                                onChange={e => updateZone(z.id, "notes", e.target.value)} />
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })
            )}

            <div className="gen-row">
              {!canGen && (
                <div className="gen-hint">
                  {!patientName.trim() ? "Enter patient name to continue"
                    : !startDate ? "Set a start date"
                    : "Select at least one treatment area"}
                </div>
              )}
              <button className="gen-btn" disabled={!canGen} onClick={() => setShowPDF(true)}>
                Generate PDF Plan →
              </button>
            </div>
          </div>
        </div>
      </div>

      {/* ── PDF Modal ── */}
      {showPDF && (
        <div className="overlay" onClick={e => e.target === e.currentTarget && setShowPDF(false)}>
          <div className="modal">
            <button className="modal-close" onClick={() => setShowPDF(false)}>×</button>

            {/* Header */}
            <div className="m-header">
              <div>
                <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}}>
                  <img src="data:image/png;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgAgADIAMAAxADb/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/2wBDAQUFBQcGBw4ICA4eFBEUHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh7/wAARCAFKBJwDASIAAhEBAxEB/8QAHAABAAMBAQEBAQAAAAAAAAAAAAYHCAUEAwIB/8QAWhAAAQMCAgUFCQkLCgUEAgMAAQACAwQFBhEHEiExQRNRYXGBCBQiNjd0kaGzFTJCUlV1sbLRFhcjYnJzg5KUwdIzNDVTVoKipMLDQ1SEk/AkJZWjZOFEY2X/xAAcAQEAAQUBAQAAAAAAAAAAAAAABQIDBAYHAQj/xABLEQACAQMBBAUHCQUGBQQDAQAAAQIDBBEFBhIhMRNBUWFxByIygZGhsRQVMzVCUnLB0TRUc5KyFhcjYoLhNlPC4vAkJdLxJkOTov/aAAwDAQACEQMRAD8AvZERfJJAhERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREB5Z7lbqeUxT19LFI3ex8zWkdhK/HuxaflSh/aG/as1ac/KneP0HsI1CV1PTvJzSvLSlcO4a34xljd5ZSeOZIQsVKKlnmbL92LT8qUP7Q37U92LT8qUP7Q37VjRFmf3X0v3l/yr9Sr5vX3jZfuxaflSh/aG/anuxaflSh/aG/asaIn919L95f8q/UfN6+8bL92LT8qUP7Q37U92LT8qUP7Q37VjRE/uvpfvL/lX6j5vX3jZfuxaflSh/aG/anuxaflSh/aG/asaIn919L95f8AKv1HzevvGy/di0/KlD+0N+1Pdi0/KlD+0N+1Y0RP7r6X7y/5V+o+b1942X7sWn5Uof2hv2p7sWn5Uof2hv2rGiJ/dfS/eX/Kv1HzevvGy/di0/KlD+0N+1Pdi0/KlD+0N+1Y0RP7r6X7y/5V+o+b1942X7sWn5Uof2hv2p7sWn5Uof2hv2rGiJ/dfS/eX/Kv1HzevvGzor                   <div className="m-practice" style={{marginBottom:0}}>PS Health · Newstead</div>
                </div>
                <div className="m-title">
                  <em style={{color:d.col}}>{d.name}</em> Treatment Plan
                </div>
              </div>
              <div className="m-meta">
                <strong>Dr H. Balachandran</strong>
                MBBS · FRACGP<br/>
                {fmtDateLong(todayISO)}
              </div>
            </div>

            {/* Patient strip */}
            <div className="m-patient">
              <div><div className="pl">Patient</div><div className="pv">{patientName}</div></div>
              {patientDOB && <><div className="m-pdiv"/><div><div className="pl">Date of Birth</div><div className="pv">{patientDOB}</div></div></>}
              <div><div className="pl">Treatment Start</div><div className="pv">{fmtDateLong(startDate)}</div></div>
              <div style={{marginLeft:"auto"}}><div className="pl">Total Phases</div><div className="pv">{phaseNums.length}</div></div>
            </div>

            {/* Prescription */}
            <div className="m-slbl">Prescription</div>
            <div className="m-rx">
              <div className="m-rx-name">{d.name} <span>({d.generic})</span></div>
              <div className="m-rx-detail">{drug === "efudix" ? "Private prescription · 40 g tube · 1 repeat per phase" : zones.some(z => z.indication === "Superficial BCC") ? "PBS Authority Required · Script per phase" : "PBS Streamlined Authority · Script per phase"}</div>
              <div className="m-rx-grid">
                <div className="m-rx-cell"><div className="cl">Drug</div><div className="cv">{d.name}</div></div>
                <div className="m-rx-cell"><div className="cl">Phases</div><div className="cv">{phaseNums.length} sequential course{phaseNums.length !== 1 ? "s" : ""}</div></div>
                <div className="m-rx-cell"><div className="cl">PBS Status</div><div className="cv">{drug === "efudix" ? "Private — not PBS listed" : zones.some(z => z.indication === "Superficial BCC") ? "PBS Authority Required" : "PBS Streamlined Authority"}</div></div>
              </div>
            </div>

            {/* Timeline overview */}
            <div className="m-slbl">Treatment Timeline</div>
            <div className="m-gen" style={{marginBottom:8}}>
              {phaseNums.map(ph => {
                const pd   = phaseData[ph];
                const col  = PHASE_COLS[(ph-1) % PHASE_COLS.length];
                const soft = PHASE_SOFT[(ph-1) % PHASE_SOFT.length];
                return (
                  <div key={ph} className="m-tl-row">
                    <div className="m-tl-pill" style={{background:soft,color:col}}>Phase {ph}</div>
                    <div className="m-tl-info">
                      {pd.zones.map(z => z.label).join(" + ")}
                      <span style={{color:"#9C9089"}}> · {pd.durationWeeks} week{pd.durationWeeks !== 1 ? "s" : ""}</span>
                    </div>
                    <div className="m-tl-dates">{fmtDate(pd.start)} → {fmtDate(pd.end)}</div>
                  </div>
                );
              })}
              {lastPhaseData && (
                <div style={{fontSize:12,color:"#9C9089",borderTop:"1px solid #E8E4DF",paddingTop:8,marginTop:8}}>
                  Estimated completion: <strong style={{color:"#1C1814"}}>{fmtDateLong(lastPhaseData.end)}</strong>
                  &nbsp;·&nbsp; Final review: <strong style={{color:"#1C1814"}}>{fmtDateLong(addWeeks(lastPhaseData.end, 8))}</strong>
                </div>
              )}
            </div>

            {/* Phase details */}
            <div className="m-slbl">Treatment Areas by Phase</div>
            {phaseNums.map(ph => {
              const pd   = phaseData[ph];
              const col  = PHASE_COLS[(ph-1) % PHASE_COLS.length];
              const soft = PHASE_SOFT[(ph-1) % PHASE_SOFT.length];
              return (
                <div key={ph} className="m-phase-block">
                  <div className="m-phase-hd" style={{background:soft,borderColor:col+"33"}}>
                    <span className="m-phase-hd-pill" style={{background:col,color:"#fff"}}>Phase {ph}</span>
                    <span style={{fontSize:13,color:"#1C1814",fontWeight:500}}>
                      {pd.zones.map(z => z.label).join(" + ")}
                    </span>
                    <span className="m-phase-hd-dates">{fmtDate(pd.start)} → {fmtDate(pd.end)} · {pd.durationWeeks} weeks</span>
                  </div>
                  {pd.zones.map(z => {
                    const ind = d.indications[z.indication];
                    return (
                      <div key={z.id} className="m-zone">
                        <div className="m-zone-head" style={{color:col}}>{z.label}</div>
                        <div className="m-ind-chip" style={{background:soft,color:col}}>{ind.label}</div>
                        <div className="m-zone-grid">
                          <div className="m-zone-row"><span>Frequency: </span>{ind.freq}</div>
                          <div className="m-zone-row"><span>Duration: </span>{ind.durationLabel}</div>
                          <div className="m-zone-row"><span>Reviews: </span>{ind.review}</div>
                          <div className="m-zone-row"><span>Target: </span>{ind.target}</div>
                        </div>
                        <div className="m-zone-clinote">{ind.note}</div>
                        {z.notes.trim() && (
                          <div className="m-zone-drtext">
                            <strong>Doctor's Notes</strong>{z.notes}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })}

            {/* General instructions */}
            <div className="m-slbl">General Instructions</div>
            <div className="m-gen">
              <ul>
                {drug === "efudix" ? (<>
                  <li>Apply as a <strong>fine smear</strong> using a gloved finger. Avoid heavy rubbing.</li>
                  <li>Wash hands thoroughly after every application.</li>
                  <li>Avoid eyes, nostrils, and lips. <strong>Do not use occlusive dressings.</strong></li>
                  <li>Apply evening dose at least 2–3 hours before bed to avoid rubbing onto pillowcase.</li>
                  <li>Redness begins day 4–5 — expected. <strong>Do not stop at redness only.</strong> Wait for dark adherent scabs (erosive stage), then stop.</li>
                  <li>Once stopped: apply <strong>Advantan Fatty Ointment®</strong> to reduce discomfort. Healing takes ~2 weeks.</li>
                  <li>Allow skin to <strong>fully heal</strong> before starting the next phase — wait until all crusting has resolved.</li>
                  <li>Avoid direct sun exposure to treated areas during each course.</li>
                  <li><strong>Do not use if pregnant or trying to conceive.</strong></li>
                  <li>Any lesion persisting 6–8 weeks post-treatment must be reviewed — biopsy may be required.</li>
                </>) : (<>
                  <li>Apply once daily to the affected area <strong>on scheduled days only</strong> — do not apply on off days.</li>
                  <li>Use a gloved finger. Do not wash the treated area for <strong>8 hours</strong> after application.</li>
                  <li>Avoid eyes, nostrils, and lips. Treatment area limited to <strong>25 cm²</strong> per site.</li>
                  <li>A crusting reaction indicates the end of treatment — do not continue once this occurs.</li>
                  <li>Allow skin to <strong>fully heal</strong> before starting the next phase — minimum 4 weeks between courses.</li>
                  <li>Systemic flu-like symptoms may occur if the 25 cm² field limit is exceeded.</li>
                  <li><strong>Do not use if pregnant or trying to conceive.</strong></li>
                  <li>Any lesion persisting at review must be reassessed — biopsy may be required.</li>
                </>)}
              </ul>
            </div>

            {/* Early review */}
            <div className="m-slbl" style={{color:"#C4503A",borderBottomColor:"#F0E0DC"}}>⚠ Book an Earlier Appointment If…</div>
            <div className="m-early">
              <div className="m-early-intro">
                The following are <strong>not</strong> normal parts of treatment. If any occur, <strong>stop the cream and contact the practice</strong> to arrange an earlier review. You can send a photo via the practice messaging system.
              </div>
              <div className="m-early-grid">
                {[
                  ["🔴","Signs of infection","Increasing warmth, swelling, pus, or weeping that is not settling"],
                  ["🔴","Spreading redness","Redness or crusting spreading well beyond the intended treatment area"],
                  ["🔴","Severe pain","Discomfort is expected — severe pain not controlled with paracetamol is not"],
                  ["🔴","Fever or flu-like symptoms","Feeling unwell or shivering — especially relevant with Aldara"],
                  ["🟡","No reaction by day 10","Contact us — the cream may not be absorbing correctly"],
                  ["🟡","Reaction near eyes, lips, or nostrils","Significant irritation or swelling from accidental contact"],
                  ["🟡","Allergic reaction","Widespread rash, hives, or unusual swelling — stop immediately"],
                  ["🟡","Concerned about a lesion","A spot that looks different, is growing, bleeding, or not behaving as expected"],
                ].map(([icon, head, body]) => (
                  <div key={head} className="m-early-item">
                    <div className="m-early-icon">{icon}</div>
                    <div>
                      <div className="m-early-head">{head}</div>
                      <div className="m-early-body">{body}</div>
                    </div>
                  </div>
                ))}
              </div>
              <div className="m-early-footer">
                For non-urgent questions, photos can be sent via the practice. For urgent concerns, call the practice during business hours or present to your nearest Emergency Department after hours.
              </div>
            </div>

            {/* Footer */}
            <div className="m-footer">
              <div>
                PS Health Newstead<br/>
                Ongoing skin surveillance recommended every 6–12 months.
              </div>
              <div style={{textAlign:"right"}}>
                <div className="sig-line"/>
                Dr H. Balachandran MBBS · FRACGP<br/>
                Date: {fmtDateLong(todayISO)}
              </div>
            </div>

            <div className="m-actions">
              <button className="btn-back" onClick={() => setShowPDF(false)}>← Edit</button>
              <button className="btn-print" onClick={() => window.print()}>🖨 Print / Save as PDF</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
